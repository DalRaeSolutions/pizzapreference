specVersion: '4.0'
metadata:
  name: com.dalraesolutions.pizzapreference.pizzapreference
type: application
resources:
  configuration:
    propertiesFileSourceEncoding: UTF-8
builder:
  resources:
    excludes:
      - "/test/**"
      - "/localService/**"
  customTasks:
  - name: webide-extension-task-updateManifestJson
    beforeTask: generateCachebusterInfo
    configuration:
      appFolder: webapp
      destDir: dist
  - name: ui5-task-zipper
    afterTask: generateCachebusterInfo
    configuration:
      archiveName: pizzapreference
      additionalFiles:
      - xs-app.json
